name: SecureObs IaC Analysis

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secureobs-iac-${{ github.ref }}
  cancel-in-progress: false

jobs:
  secureobs-iac:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "SecureObs static + Checkov — terraform/azure"
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -e SECUREOBS_API_KEY="${{ secrets.SECUREOBS_API_KEY }}" \
            "secureobs/scanner:v1.2.11" scan \
              --project-id "7a751a5c-b3b3-42d6-a19c-03750f6d7c36" \
              --tenant-id "1067c3cb-9e2a-4ebf-b5c1-a070439bd5a3" \
              --pipeline-run-id "${{ github.run_id }}-95b11161d7d140a99a1c94a786571ace" \
              --terraform-root-id "95b11161-d7d1-40a9-9a1c-94a786571ace" \
              --source-revision "${{ github.sha }}" \
              --iac-only \
              --require-infrastructure-analysis \
              --terraform-root "terraform/azure"
